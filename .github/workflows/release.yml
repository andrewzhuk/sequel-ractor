name: Release

# Triggered when you publish a GitHub Release (CLI: `gh release create v0.1.0
# --generate-notes`, or via the web UI). The workflow builds the gem and
# publishes it to rubygems.org using Trusted Publishing (OIDC) — no API
# key required.
#
# Why release-based and not tag-based:
#   - A GitHub Release is an explicit publish action. You can draft, edit
#     notes, review the autogenerated changelog, then click Publish.
#   - A bare `git push --tags` is too easy to do by accident (typo in tag,
#     leftover local tag from experimentation).
#   - The release page is where users actually look — the .gem artifact
#     gets attached to it automatically below.
#
# One-time setup on rubygems.org:
#   1. Sign in as the gem owner.
#   2. Go to https://rubygems.org/gems/sequel-ractor/trusted_publishers
#      (for an unpublished gem, use the pending-publishers page in your
#      profile settings instead).
#   3. Add a GitHub Actions trusted publisher with:
#        Repository owner:  andrewzhuk
#        Repository name:   sequel-ractor
#        Workflow filename: release.yml
#        Environment:       (leave blank)
#
# After that, every `gh release create vX.Y.Z` fires this workflow
# unattended.

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # to attach the built .gem to the release
      id-token: write   # OIDC token exchange with rubygems.org

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the tagged commit, not main HEAD — they may have
          # diverged between cutting the release and the workflow firing.
          ref: ${{ github.event.release.tag_name }}

      # Same Ruby version constraint as ci.yml — gemspec requires >= 4.0,
      # and setup-ruby's catalog has no tagged 4.0 yet, so use head.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "head"
          bundler-cache: true

      # Safety net: the release tag must match SequelRactor::VERSION.
      # Otherwise we'd publish a tag-named version with a different
      # internal version number — confusing and irreversible.
      - name: Verify release tag matches gemspec version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GEM_VERSION=$(ruby -e 'require_relative "lib/sequel/ractor/version"; puts SequelRactor::VERSION')
          echo "Release tag: $TAG_VERSION"
          echo "Gemspec:     $GEM_VERSION"
          if [ "$TAG_VERSION" != "$GEM_VERSION" ]; then
            echo "::error::Release tag $TAG_VERSION does not match gemspec version $GEM_VERSION"
            exit 1
          fi

      # Configures ~/.gem/credentials with a short-lived OIDC token
      # exchanged against the trusted-publisher config on rubygems.org.
      - uses: rubygems/configure-rubygems-credentials@main

      - name: Build gem
        run: gem build sequel-ractor.gemspec

      - name: Push to rubygems.org
        run: gem push sequel-ractor-*.gem

      # Attach the built .gem to the GitHub Release page so anyone
      # browsing releases can grab a binary copy.
      - name: Attach .gem to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: sequel-ractor-*.gem
